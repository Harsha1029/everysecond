<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Social Bar Ads -->
    <script src="https://pl28885728.effectivegatecpm.com/39/24/9b/39249b8130e5322bd17c91238b2e0ce2.js"></script>
    <title>Contact — everysecond</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Shared styles now in style.css */
    </style>
</head>

<body>
    <nav class="navbar" style="position: fixed; width: 100%;">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <img src="logo.png" alt="EverySecond Logo" class="logo-img">
                <span class="logo-text">everysecond</span>
            </a>
            <button class="theme-toggle" id="theme-toggle" aria-label="Toggle Dark Mode" style="margin-left: auto;">
                <span class="icon-moon">🌙</span>
                <span class="icon-sun">☀️</span>
            </button>
        </div>
    </nav>

    <div class="legal-content">
        <a href="index.html" class="back-home">← Back to World Stats</a>
        <div class="legal-header">
            <h1>Contact Us</h1>
            <p>We'd love to hear from you</p>
        </div>

        <div class="contact-form">
            <form action="#" method="POST" onsubmit="event.preventDefault(); alert('Message sent successfully!')">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea rows="5" placeholder="Your message here..." required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-bottom">
            <p>&copy; 2026 everysecond. All rights reserved.</p>
        </div>
    </footer>

    <script>
        const toggle = document.getElementById('theme-toggle');
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
        }

        toggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });
    </script>
</body>

</html>
