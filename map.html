<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live World Map — everysecond</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@500;700&display=swap"
        rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson@3"></script>
    <script src="https://unpkg.com/suncalc@1.9.0/suncalc.js"></script>
    <style>
        :root {
            --bg-night: #0B0E14;
            --text-light: #FAF8F5;
            --accent-sun: #FFD23F;
            --accent-glow: rgba(255, 210, 63, 0.4);
            --border-ui: rgba(255, 255, 255, 0.1);
            --bg-glass: rgba(11, 14, 20, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-night);
            color: var(--text-light);
            font-family: 'DM Sans', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* Loading Screen */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-night);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .loader-spin {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-ui);
            border-top: 3px solid var(--accent-sun);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        /* Map Styles */
        #map-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
        }

        #map-container:active {
            cursor: grabbing;
        }

        .land {
            fill: #2D3436;
            stroke: #1A1A1A;
            stroke-width: 0.5px;
        }

        .night-overlay {
            fill: rgba(0, 5, 20, 0.65);
            pointer-events: none;
            mix-blend-mode: multiply;
        }

        .day-highlight {
            fill: #E8533A;
            opacity: 0.05;
            pointer-events: none;
        }

        .city-lights {
            fill: var(--accent-sun);
            opacity: 0.4;
            pointer-events: none;
            filter: blur(1px);
        }

        .graticule {
            fill: none;
            stroke: rgba(255, 255, 255, 0.05);
            stroke-width: 0.2px;
        }

        /* UI Elements */
        .ui-panel {
            position: absolute;
            background: var(--bg-glass);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-ui);
            border-radius: 20px;
            padding: 24px;
            z-index: 10;
        }

        .top-left {
            top: 24px;
            left: 24px;
        }

        .bottom-left {
            bottom: 24px;
            left: 24px;
        }

        .bottom-right {
            bottom: 24px;
            right: 24px;
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 20px;
            background: linear-gradient(135deg, #E8533A, #FFD23F);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-link {
            display: block;
            margin-top: 8px;
            color: var(--text-light);
            font-size: 12px;
            text-decoration: none;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .back-link:hover {
            opacity: 1;
        }

        .time-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .date-display {
            font-size: 14px;
            opacity: 0.6;
            margin-bottom: 16px;
        }

        .country-card {
            min-width: 240px;
            transition: all 0.3s ease;
        }

        .label {
            font-size: 10px;
            color: var(--accent-sun);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .value {
            font-size: 18px;
            font-weight: 700;
        }

        .sub-value {
            font-size: 13px;
            opacity: 0.6;
            margin-top: 4px;
        }

        .user-dot {
            fill: #E8533A;
            stroke: #fff;
            stroke-width: 2px;
        }

        .user-dot-pulse {
            fill: #E8533A;
            opacity: 0.4;
        }

        .sun-icon {
            fill: var(--accent-sun);
            filter: drop-shadow(0 0 8px var(--accent-sun));
        }

        #tooltip {
            position: fixed;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.9);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: none;
            z-index: 100;
        }
    </style>
</head>

<body>

    <div id="loader">
        <div class="loader-spin"></div>
        <p style="margin-top: 16px; font-size: 12px; letter-spacing: 2px;">SYNCHRONIZING EARTH DATA...</p>
    </div>

    <div id="tooltip"></div>

    <div class="ui-panel top-left">
        <a href="index.html" class="logo">🌍 everysecond</a>
        <a href="index.html" class="back-link">← Back to Stats</a>
    </div>

    <div class="ui-panel bottom-left">
        <div class="label">Universal System Time</div>
        <div class="time-display" id="utc-time">00:00:00</div>
        <div class="date-display" id="utc-date">Monday, March 09, 2026</div>

        <div class="country-card" id="active-country">
            <div class="label">Region Focus</div>
            <div class="value" id="country-name">Click a Country</div>
            <div id="country-data" style="display:none">
                <div class="sub-value" id="local-time">Local Time: --:--</div>
            </div>
        </div>
    </div>

    <div class="ui-panel bottom-right">
        <div class="label">Live Indicators</div>
        <div style="display:flex; gap: 16px; margin-top: 8px;">
            <div style="display:flex; align-items:center; gap:8px">
                <div style="width:8px; height:8px; border-radius:50%; background:var(--accent-sun)"></div>
                <span style="font-size:12px; opacity:0.8">Daylight</span>
            </div>
            <div style="display:flex; align-items:center; gap:8px">
                <div style="width:8px; height:8px; border-radius:50%; background:#10B981"></div>
                <span style="font-size:12px; opacity:0.8">You</span>
            </div>
        </div>
    </div>

    <div id="map-container"></div>

    <script>
        const width = window.innerWidth;
        const height = window.innerHeight;
        const projection = d3.geoOrthographic()
            .scale(Math.min(width, height) / 2.2)
            .translate([width / 2, height / 2])
            .rotate([0, 0])
            .precision(0.1);

        const path = d3.geoPath().projection(projection);
        const svg = d3.select("#map-container").append("svg")
            .attr("width", width)
            .attr("height", height);

        const g = svg.append("g");

        // Ocean
        g.append("circle")
            .attr("cx", width / 2).attr("cy", height / 2)
            .attr("r", projection.scale())
            .attr("fill", "#09101A");

        const graticule = d3.geoGraticule();
        g.append("path")
            .datum(graticule)
            .attr("class", "graticule")
            .attr("d", path);

        let worldData, countries;
        let nightOverlay, sunIcon;
        let userLocation = null;

        // Load data
        Promise.all([
            d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json")
        ]).then(([data]) => {
            worldData = data;
            countries = topojson.feature(data, data.objects.countries);

            // Draw Land
            g.selectAll(".country")
                .data(countries.features)
                .enter().append("path")
                .attr("class", "country land")
                .attr("d", path)
                .on("mouseover", function (e, d) {
                    d3.select(this).style("fill", "#4A4A4A");
                    const tooltip = d3.select("#tooltip");
                    tooltip.style("display", "block")
                        .html(d.properties.name)
                        .style("left", (e.pageX + 10) + "px")
                        .style("top", (e.pageY - 10) + "px");
                })
                .on("mouseout", function () {
                    d3.select(this).style("fill", "#2D3436");
                    d3.select("#tooltip").style("display", "none");
                })
                .on("click", (e, d) => showCountryDetails(d));

            // Night Overlay
            nightOverlay = g.append("path")
                .attr("class", "night-overlay");

            // Sun Icon
            sunIcon = g.append("path")
                .attr("class", "sun-icon");

            initUserLocation();
            updateNightLayer();
            d3.select("#loader").transition().duration(1000).style("opacity", 0).remove();

            // Animation loop
            d3.timer(() => {
                updateTime();
            });

            // Slower updates for positions
            setInterval(updateNightLayer, 60000); // every minute
        });

        function updateTime() {
            const now = new Date();
            document.getElementById('utc-time').textContent = now.toLocaleTimeString('en-US', { hour12: false });
            document.getElementById('utc-date').textContent = now.toLocaleDateString('en-US', {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
            });
        }

        function updateNightLayer() {
            const now = new Date();

            // Calculate Night Polygon
            const sunPos = SunCalc.getPosition(now, 0, 0); // Temporary to find altitude
            // More accurately: find lat/lng where sun is overhead
            const solDeclination = getSolarDeclination(now);
            const solLong = getSolarLongitude(now);

            const sunCoord = [solLong, solDeclination];

            // Night is 90 deg away from sun
            const nightCircle = d3.geoCircle().center([-sunCoord[0], -sunCoord[1]]).precision(1).radius(90)();
            nightOverlay.datum(nightCircle).attr("d", path);

            // Sun position (Day side)
            const sunCircle = d3.geoCircle().center(sunCoord).radius(2)();
            sunIcon.datum(sunCircle).attr("d", path);

            updateUserDot();
        }

        // Simplified Solar Math
        function getSolarDeclination(now) {
            const dayOfYear = (now - new Date(now.getFullYear(), 0, 0)) / 86400000;
            return 23.45 * Math.sin((360 / 365 * (dayOfYear + 284)) * Math.PI / 180);
        }

        function getSolarLongitude(now) {
            const hours = now.getUTCHours() + now.getUTCMinutes() / 60 + now.getUTCSeconds() / 3600;
            return (12 - hours) * 15;
        }

        function initUserLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    userLocation = [pos.coords.longitude, pos.coords.latitude];
                    updateUserDot();
                });
            }
        }

        function updateUserDot() {
            if (!userLocation) return;

            g.selectAll(".user-marker").remove();

            const coords = projection(userLocation);
            if (!coords) return;

            // Pulse
            g.append("circle")
                .attr("class", "user-marker user-dot-pulse")
                .attr("cx", coords[0]).attr("cy", coords[1])
                .attr("r", 8)
                .transition().duration(2000).repeat(Infinity)
                .attr("r", 20).style("opacity", 0).remove();

            g.append("circle")
                .attr("class", "user-marker user-dot")
                .attr("cx", coords[0]).attr("cy", coords[1])
                .attr("r", 4);
        }

        function showCountryDetails(d) {
            const name = d.properties.name;
            document.getElementById('country-name').textContent = name;
            document.getElementById('country-data').style.display = 'block';

            // Mock local time logic (approximated by longitude)
            const centroid = d3.geoCentroid(d);
            const offset = Math.round(centroid[0] / 15);
            const now = new Date();
            const local = new Date(now.getTime() + (offset * 3600000));

            document.getElementById('local-time').textContent = `Est. Local Time: ${local.getUTCHours().toString().padStart(2, '0')}:${local.getUTCMinutes().toString().padStart(2, '0')}`;
        }

        // Interaction: Drag to rotate
        const drag = d3.drag()
            .on("drag", (event) => {
                const rotate = projection.rotate();
                const k = 75 / projection.scale();
                projection.rotate([
                    rotate[0] + event.dx * k,
                    rotate[1] - event.dy * k
                ]);
                refreshPaths();
            });

        svg.call(drag);

        function refreshPaths() {
            g.selectAll("path").attr("d", path);
            updateUserDot();
        }

        window.addEventListener('resize', () => {
            // Simple reload for resize logic
            window.location.reload();
        });
    </script>
</body>

</html>
